name: Build official mechanical price history

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_mechanical_history.py'
      - 'scripts/build_mechanical_history_10y.py'
      - 'scripts/mechanical_csv_to_xlsx.py'
      - '.github/workflows/build-mechanical-history.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: mechanical-history-builder
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install parser dependencies
        run: pip install requests beautifulsoup4 pymupdf openpyxl

      - name: Download and parse official YFK archive for 2017-2026
        id: parse
        continue-on-error: true
        run: |
          mkdir -p generated/mechanical-history-2017-2026
          printf '%s\n' '${{ github.run_id }}' > generated/mechanical-history-2017-2026/RUN_ID.txt
          echo "Build started at $(date -u +%FT%TZ)"
          python scripts/build_mechanical_history_10y.py 2>&1 | tee generated/mechanical-history-2017-2026/build.log
          parse_code=${PIPESTATUS[0]}
          if [ "$parse_code" = "0" ]; then
            python scripts/mechanical_csv_to_xlsx.py 2>&1 | tee -a generated/mechanical-history-2017-2026/build.log
            xlsx_code=${PIPESTATUS[0]}
          else
            xlsx_code=1
          fi
          echo "exit_code=$parse_code" >> "$GITHUB_OUTPUT"
          echo "xlsx_code=$xlsx_code" >> "$GITHUB_OUTPUT"

      - name: Write failure marker when needed
        if: always()
        run: |
          if [ "${{ steps.parse.outputs.exit_code }}" != "0" ] || [ "${{ steps.parse.outputs.xlsx_code }}" != "0" ]; then
            printf 'Parser exit code: %s\nExcel exit code: %s\nRun: %s\n' '${{ steps.parse.outputs.exit_code }}' '${{ steps.parse.outputs.xlsx_code }}' '${{ github.run_id }}' > generated/mechanical-history-2017-2026/BUILD_FAILED.txt
          else
            rm -f generated/mechanical-history-2017-2026/BUILD_FAILED.txt
          fi

      - name: Upload generated workbook and controls
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mechanical-history-2017-2026
          path: generated/mechanical-history-2017-2026
          if-no-files-found: error
          retention-days: 7

      - name: Commit generated workbook and CSV controls
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/mechanical-history-2017-2026
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Generate 2017-2026 mechanical price Excel workbook"
          git push
