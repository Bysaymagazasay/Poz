name: Export current mechanical data
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-current-mechanical-data.yml'
  workflow_dispatch:
permissions:
  contents: write
  actions: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare artifact
        run: |
          mkdir -p generated/current-mechanical-export
          cp data.js generated/current-mechanical-export/data.js
          printf '%s\n' '${{ github.run_id }}' > generated/current-mechanical-export/RUN_ID.txt
      - uses: actions/upload-artifact@v4
        with:
          name: current-mechanical-data
          path: generated/current-mechanical-export
          retention-days: 1
      - name: Commit run id
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/current-mechanical-export/RUN_ID.txt
          git commit -m "Record current mechanical export run" || exit 0
          git push
