name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4
      - name: GitHub Pages ayarları
        uses: actions/configure-pages@v5
      - name: Site dosyalarını hazırla
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Siteyi yayınla
        id: deployment
        uses: actions/deploy-pages@v4
