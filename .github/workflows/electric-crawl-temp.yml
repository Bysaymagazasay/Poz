name: Elektrik Poz Tanimlari Gecici
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: electric-crawl-temp
  cancel-in-progress: true
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bf-site-inspect
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python tools/crawl_electric_descriptions.py | tee electric-crawl.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: electric-birimfiyat-results-main
          path: |
            electric_birimfiyat_results.json
            electric_birimfiyat_results.csv
            electric_birimfiyat_progress.json
            electric-crawl.log
      - name: Sonuclari dala kaydet
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B electric-results
          git add -f electric_birimfiyat_results.json electric_birimfiyat_results.csv electric_birimfiyat_progress.json electric-crawl.log
          git commit -m "Elektrik poz tanim sorgu sonuclari" || true
          git push --force origin electric-results
