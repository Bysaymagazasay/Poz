name: Update construction cost index

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install parser dependencies
        run: pip install requests beautifulsoup4

      - name: Refresh TÜİK construction cost index mirror
        run: python scripts/update_construction_cost_index.py

      - name: Commit updated index
        run: |
          if git diff --quiet -- data/construction-cost-index.json; then
            echo "No index changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/construction-cost-index.json
          git commit -m "Update construction cost index"
          git push
