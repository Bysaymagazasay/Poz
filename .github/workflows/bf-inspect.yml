name: Birimfiyat Site Inspect
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python tools/inspect_birimfiyat.py | tee inspect.log
      - uses: actions/upload-artifact@v4
        with:
          name: birimfiyat-inspect
          path: |
            inspect.log
            inspect.json
            home.html
            inline_*.js
            script_*.js
